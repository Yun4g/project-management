<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Project Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="shell">
  <div class="header">
    <h1>My Projects</h1>
    <button class="add-btn" onclick="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      New Project
    </button>
  </div>

  <div class="grid" id="grid"></div>
</div>


<div class="overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Project</div>
      <button class="close-btn" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label">Project Name *</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Brand Redesign">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="f-desc" placeholder="What's this project about?"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveProject()">Save Project</button>
    </div>
  </div>
</div>


<div class="overlay" id="del-overlay" onclick="delOverlayClick(event)">
  <div class="modal del-modal">
    <div class="del-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <h3>Delete Project?</h3>
    <p>This action cannot be undone. The project and all its data will be permanently removed.</p>
    <div class="modal-footer" style="justify-content:center; margin-top:24px;">
      <button class="btn-ghost" onclick="closeDelModal()">Keep it</button>
      <button class="btn-danger" onclick="confirmDelete()">Yes, Delete</button>
    </div>
  </div>
</div>


<div class="toast" id="toast"></div>

<script src="/script.js"></script>
</body>
</html>
